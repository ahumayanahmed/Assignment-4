<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>BD Jobs Website</title>
</head>
<body class="bg-gray-100">

<div class="max-w-5xl mx-auto p-4">

    <h1 class="text-3xl font-bold mb-6">Job Application Tracker</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

        <div class="bg-white p-4 rounded shadow">
            <p class="text-gray-500">Total</p>
            <h2 id="totalCount" class="text-2xl font-bold">0</h2>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <p class="text-gray-500">Interview</p>
            <h2 id="interviewCount" class="text-2xl font-bold text-green-600">0</h2>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <p class="text-gray-500">Rejected</p>
            <h2 id="rejectedCount" class="text-2xl font-bold text-red-600">0</h2>
        </div>

    </div>

    
    <div class="flex justify-between items-center mb-3">

        <h2 class="text-xl font-semibold">Available Jobs</h2>

        <span id="sectionCount" class="text-gray-500">0 jobs</span>

    </div>

   
    <div class="flex gap-2 mb-4">

        <button data-tab="all"
        class="tab px-4 py-2 rounded bg-blue-600 text-white">
        All
        </button>

        <button data-tab="interview"
        class="tab px-4 py-2 rounded bg-gray-200">
        Interview
        </button>

        <button data-tab="rejected"
        class="tab px-4 py-2 rounded bg-gray-200">
        Rejected
        </button>

    </div>

    
    <div id="jobsContainer" class="space-y-4">

    </div>

</div>    


    
    <script src="index.js"></script>
</body>
</html>
